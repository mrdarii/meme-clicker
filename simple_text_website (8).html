<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meme-clicker.com</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f0f12;
      color:#ffffff;
      overflow-x:hidden;
    }

    .topbar{
      position:fixed;
      top:0;
      width:100%;
      padding:12px 20px;
      background:#1a1a1f;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:10;
      border-bottom:1px solid #333;
    }

    .stats{
      display:flex;
      gap:20px;
      font-weight:bold;
    }

    .btn{
      padding:10px 16px;
      border:none;
      border-radius:8px;
      background:#4f46e5;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .hero{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .hero h1{
      font-size:40px;
    }

    .game{
      padding:120px 20px;
      text-align:center;
    }

    .click-btn{
      width:160px;
      height:160px;
      border-radius:50%;
      border:none;
      background:#4f46e5;
      font-size:20px;
      color:white;
      cursor:pointer;
    }

    .click-btn:active{
      transform:scale(0.95);
    }

    .upgrade{
      margin-top:15px;
      padding:15px;
      background:#1a1a1f;
      border:1px solid #333;
      border-radius:10px;
      display:inline-block;
      min-width:220px;
    }

    button.up{
      margin-top:8px;
      padding:10px 14px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .yellow{
      color:yellow;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div><b>MEME CLICKER</b></div>
  <div class="stats">
    <div>Total: <span id="total">0</span></div>
    <div>Points: <span id="points">0</span></div>
    <div>CPS: <span id="cps">0</span></div>
  </div>
</div>

<div class="hero">
  <h1>MEME CLICKER</h1>
  <button class="btn" onclick="scrollGame()">START</button>
</div>

<div class="game" id="game">

  <button class="click-btn" id="clickBtn">CLICK</button>

  <div style="margin-top:20px">
    POWER: <span id="power">1</span><br>
    AUTO: <span id="auto">OFF</span>
  </div>

  <div class="upgrade">
    <b>+ CLICK 1</b><br>
    COST: <span id="cost1">20</span><br>
    <button class="up" id="buy1">BUY</button>
  </div>

  <div class="upgrade">
    <b>+ CLICK 2</b><br>
    COST: <span id="cost2">40</span><br>
    <button class="up" id="buy2">BUY</button>
  </div>

  <div class="upgrade">
    <b>+ CLICK 3 (AUTO)</b><br>
    COST: <span id="cost3">100</span><br>
    <button class="up" id="buy3">BUY</button>
  </div>

  <div class="upgrade">
    <b>+ CLICK 4</b><br>
    COST: <span id="cost4">10000</span><br>
    <button class="up" id="buy4">BUY</button>
  </div>

</div>

<audio id="music" loop>
  <source src="https://actions.google.com/sounds/v1/ambiences/industrial_background.ogg">
</audio>

<script>
let points=0;
let total=0;
let power=1;
let cost1=20,cost2=40,cost3=100,cost4=10000;
let auto=false;
let clicks=[];

function scrollGame(){document.getElementById('game').scrollIntoView({behavior:'smooth'});}
window.scrollGame=scrollGame;

function updateCPS(){
  const now=Date.now();
  clicks=clicks.filter(t=>now-t<1000);
  document.getElementById('cps').innerText=clicks.length;
}

function add(v){points+=v;total+=v;}

function update(){
  document.getElementById('points').innerText=points;
  document.getElementById('total').innerText=total;
  document.getElementById('power').innerText=power;
  document.getElementById('cost1').innerText=cost1;
  document.getElementById('cost2').innerText=cost2;
  document.getElementById('cost3').innerText=cost3;
  document.getElementById('cost4').innerText=cost4;
  document.getElementById('auto').innerText=auto?'ON':'OFF';

  if(points>=100000){document.getElementById('points').classList.add('yellow');}
}

function click(){
  const music=document.getElementById('music');
  if(music.paused) music.play();

  clicks.push(Date.now());
  updateCPS();

  add(power);
  update();
}

function buy1(){if(points>=cost1){points-=cost1;power++;cost1+=20;}update();}
function buy2(){if(points>=cost2){points-=cost2;power+=2;cost2+=40;}update();}
function buy3(){if(points>=cost3){points-=cost3;auto=true;cost3+=100;}update();}
function buy4(){if(points>=cost4){points-=cost4;power+=10;cost4+=10000;}update();}

setInterval(()=>{if(auto){add(power);update();}},100);
setInterval(updateCPS,200);

window.onload=update;

document.getElementById('clickBtn').onclick=click;
document.getElementById('buy1').onclick=buy1;
document.getElementById('buy2').onclick=buy2;
document.getElementById('buy3').onclick=buy3;
document.getElementById('buy4').onclick=buy4;
</script>

</body>
</html>
